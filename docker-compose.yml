version: "3.8"

services:
  webapishop:
    build:
      context: .
      dockerfile: ./WebApiShop/Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__ShowsCenter=Data Source=host.docker.internal;Initial Catalog=ShowsCenterCopy;User Id=sa;Password=YourSecurePassword123!;TrustServerCertificate=True;MultipleActiveResultSets=true
      - JwtSettings__SecretKey=LocalDevelopmentSecretKey_ChangeThisToAStrongOne_2026!@#ZxYv9LpQ8rStUvWxYz1234567890
      - JwtSettings__Issuer=WebApiShopLocal
      - JwtSettings__Audience=WebApiShopLocalUsers
      - RedisCacheOptions__Configuration=redis:6379,password=MY_SECRET_PASSWORD123!!!
      - Kafka__BootstrapServers=kafka:9092
      - Kafka__TopicName=order-events
      - Email__SmtpHost=173.194.76.108
      - Email__SmtpPort=587
      - Email__UseSsl=true
      - Email__UserName=michal.icecream@gmail.com
      - Email__Password=mcnxakeepicwrkxp
      - Email__FromAddress=michal.icecream@gmail.com
      - Email__FromName=ShowsCenter
      - PasswordReset__CodeExpirationMinutes=15
      - PasswordReset__CodeLength=6
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped
    networks:
      - showscenter-network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "MY_SECRET_PASSWORD123!!!"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "MY_SECRET_PASSWORD123!!!", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - showscenter-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    ports:
      - "2181:2181"
    restart: unless-stopped
    networks:
      - showscenter-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    depends_on:
      - zookeeper
    restart: unless-stopped
    networks:
      - showscenter-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - showscenter-network

networks:
  showscenter-network:
    driver: bridge

volumes:
  redis_data:
  kafka_data: